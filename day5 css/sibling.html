<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        h1 ~ p {
            color: red;
        }
        h1 + p {
            color: blue;
        }
        #p,#k {
            color: aqua;
        }
    </style>
</head>
<body>
    <h1> this is a heading</h1>
    <p> this is gayatri</p>
    <p id="p"> this is priya</p>
    <p id="k"> this is kalyan</p>
    <p> this is yaswanth</p>

    
</body>
</html>
