<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            width: 400px;
            height: 400px;
            border: 5px solid black;
            background-color: rgb(155, 42, 165);
            border-radius: 100%;
            display: flex;
            justify-content:start;
            align-items: center;
        }
        .child {
            width: 30%;
            height: 30%;
            border-radius: 100%;
            border: 3px solid black;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"> manisha </div>
    </div>
    
</body>
</html>
