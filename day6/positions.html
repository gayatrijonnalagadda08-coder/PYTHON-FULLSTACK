<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .parent {
        width: 400px;
        height: 400px;
        border: 5px solid black;
        background-color: rgb(42, 75, 165);
        position: relative;
        
        }
        .child {
            width: 30%;
            height: 30%;
           
            border: 3px solid black;
            background-color: white;
            position: absolute;
            right: 0px;
            top: 0px;
            
        }
        
</style>
</head>
<body>
     <div class="parent">
        <div class="child"> gayatri</div>
    </div>
    
    
</body>
</html>
